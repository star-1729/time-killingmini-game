<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>程式想不出來</title>
    <meta charset="UTF-8" />    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }
    /*統一畫面顏色(ai)*/
    body {
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
    padding: 40px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #38bdf8;
    }
    .hero {
      padding: 40px 8% 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 40px;
    }
    nav a {
      text-decoration: none;
      color: white;
      margin-left: 24px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }
    .hero-text {
      flex: 1;
      min-width: 300px;
    }

    .hero-text h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero-text span {
      color: #38bdf8;
    }

    .hero-text p {
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1.8;
      max-width: 600px;
    }

    .hero-buttons {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary {
      background: #38bdf8;
      color: black;
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
    }

    .btn-secondary {
      border: 2px solid #38bdf8;
      color: #38bdf8;
    }

    .btn-secondary:hover {
      background: #38bdf8;
      color: black;
    }
    .hero-image {
      flex: 1;
      display: flex;
      justify-content: center;
      min-width: 300px;
    }

    .floating-card {
      width: 320px;
      height: 320px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7rem;
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    .games-section {
      padding: 80px 8%;
    }

    .section-title {
      font-size: 2.5rem;
      margin-bottom: 50px;
      text-align: center;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .game-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      transition: 0.3s;
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .game-banner {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }

    .snake-banner {
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    .mine-banner {
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
    }

    .coming-banner {
      background: linear-gradient(135deg, #6366f1, #312e81);
    }

    .card-banner {
      background: linear-gradient(135deg, #fbbf24, #b45309);
    }

    .game-content {
      padding: 24px;
    }

    .game-content h3 {
      font-size: 1.6rem;
      margin-bottom: 12px;
    }

    .game-content p {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .game-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .game-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .play-btn {
      background: #38bdf8;
      color: black;
    }

    .illustrate-btn {
      border: 2px solid #38bdf8;
      color: #38bdf8;
    }

    .game-btn:hover {
      transform: scale(1.03);
    }

    .about {
      padding: 80px 8%;
      text-align: center;
    }

    .about-box {
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 50px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .about-box h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .about-box p {
      color: #cbd5e1;
      line-height: 1.9;
      font-size: 1.1rem;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 50px;
    }
    @media (max-width: 768px) {
      .hero-text h1 {
        font-size: 2.8rem;
      }

      header {
        flex-direction: column;
        gap: 20px;
      }

      nav a {
        margin: 0 10px;
      }

      .floating-card {
        width: 250px;
        height: 250px;
      }
    }
    </style>
</head>
<body>
    <header>
    <div class="logo">程式想不出來</div>

    <nav>
      <a href="#games">遊戲</a>
      <a href="#about">關於</a>
      <a href="#future">未來                  更新</a>
    </nav>
  </header>
  
  <section class="hero">
    <div class="hero-text">
      <h1>歡迎來到程式想不出來</h1>
      <p>
        這裡是各種小遊戲的天地，歡迎在無聊的時候來殺時間
      </p>
      <div class="buttons">
        <a href="#games" class="btn btn-primary">開始遊戲</a>
        <a href="#about" class="btn btn-secondary">關於</a>
      </div>
    </div>

    <div class="hero-image">
      <div class="floating-card">
        <img src="" alt="our logo" style="width: 100%; height: 100%;" />
      </div>
    </div>
   </section>
    <!--img src="" alt="" /-->
    <section class="games-section" id="games">
        <h2 class="section-title">我們的遊戲</h2>
        <div class="games-grid">
            <div class="game-card">
                <div class="game-banner snake-banner">
                    <img src="" alt="貪吃蛇遊戲" />
                </div>
             <div class="game-content">
                <h3>貪吃蛇</h3>
                
                <p>
                  控制蛇吃蘋果並避免碰撞。
                </p>
                
                <div class="game-buttons">
                    <a href=".zip" download class="game-btn play-btn">開始遊戲</a>
                    <a href="#" class="game-btn illustrate-btn">說明</a>
                </div>
             </div>
            </div>

            
            <div class="game-card">
                <div class="game-banner mine-banner">
                    <img src="" alt="踩地雷遊戲" />
                </div>
             <div class="game-content">
                <h3>踩地雷</h3>
                <p>找到所有安全的地盤，避免踩到地雷。</p>
                <div class="game-buttons">
                    <a href="kard_game_new.zip" download class="game-btn play-btn">開始遊戲</a>
                    <a href="#" class="game-btn illustrate-btn">說明</a>
                </div>
             </div>
            </div>
             
            <div class="game-card">
                <div class="game-banner card-banner">
                    <img src="" alt="翻卡牌遊戲" />
                </div>
             <div class="game-content">
                <h3>翻卡牌</h3>
                <p>找出相同的兩張卡牌。</p>
                <div class="game-buttons">
                    <a href="minesweeper_new.zip" download class="game-btn play-btn">開始遊戲</a>
                    <a href="#" class="game-btn illustrate-btn">說明</a>
                </div>
              </div>
            </div>

             <div class="game-card" id="future">
        <div class="game-banner coming-banner">
          <img src="" alt="更多遊戲開發中" />
        </div>

        <div class="game-content">
          <h3>更多遊戲開發中</h3>

          <p>
            未來將持續新增更多 C++ 小遊戲，
            包含益智、動作、反應與多人玩法。
          </p>

          <div class="game-buttons">
            <a href="#" class="game-btn play-btn">敬請期待</a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script>
    const buttons = document.querySelectorAll('.play-btn');

    buttons.forEach(button => {
      button.addEventListener('mouseenter', () => {
        button.style.transform = 'scale(1.05)';
      });

      button.addEventListener('mouseleave', () => {
        button.style.transform = 'scale(1)';
      });
    });
  </script>
    
</body>
</html>
